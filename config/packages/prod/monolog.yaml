monolog:
    handlers:
        main:
            type: fingers_crossed
            action_level: error
            handler: nested
            excluded_http_codes: [404, 405]
        nested:
            type: stream
            path: "%kernel.logs_dir%/%kernel.environment%.log"
            level: debug
        console:
            type: console
            process_psr_3_messages: false
            channels: ["!event", "!doctrine"]
        deprecation:
            type: stream
            path: "%kernel.logs_dir%/%kernel.environment%.deprecations.log"
        deprecation_filter:
            type: filter
            handler: deprecation
            max_level: info
            channels: ["php"]
        # toggle handled by  \App\DependencyInjection\Compiler\ToggleLokiHandlerPass
        # remember to keep the pass up to date when you change any loki service definitions
        loki_filtered:
            type: service
            id: monolog.handler.loki_healthcheck_filter
            level: '%app.log.loki.log_level%'
            channels: [ "app", "php", "request", "http_client", "console" ]
